apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sysmon-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chrish1979/sysmon-api.git
    targetRevision: HEAD
    path: helm/sysmon-api
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: serving.knative.dev
      kind: Service
      jsonPointers:
        - /spec/template/spec/containers/0/readinessProbe
        - /spec/traffic
        - /spec/template/metadata/name
