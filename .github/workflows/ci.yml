name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sysmon-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sysmon-api:${{ github.sha }}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" helm/sysmon-api/values.yaml

      - name: Commit and push updated values.yaml
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update image tag to ${{ github.sha }}"
          file_pattern: helm/sysmon-api/values.yaml